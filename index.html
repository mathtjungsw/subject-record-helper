<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <script src="./assets/page-lock.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a0b0d" />
  <title>WORKBOX — 개인 업무 도구</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #090a0c;
      --panel: #101216;
      --panel-2: #15181d;
      --line: #242830;
      --line-hot: #3f4652;
      --text: #f1f3f5;
      --muted: #858b96;
      --dim: #5d636d;
      --lime: #c9ff63;
      --lime-soft: rgba(201, 255, 99, 0.12);
      --violet: #a88bff;
      --radius: 14px;
      --mono: "Cascadia Code", "SFMono-Regular", Consolas, monospace;
      --sans: Pretendard, "Noto Sans KR", "Apple SD Gothic Neo", Inter, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }
    html { min-width: 320px; background: var(--bg); }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--text);
      background:
        radial-gradient(circle at 76% -10%, rgba(168, 139, 255, 0.09), transparent 31rem),
        radial-gradient(circle at 10% 110%, rgba(201, 255, 99, 0.06), transparent 26rem),
        var(--bg);
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
    }

    button, input, textarea { font: inherit; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .shell {
      width: min(1180px, calc(100% - 40px));
      margin: 0 auto;
      padding: 26px 0 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      margin-bottom: 62px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font: 700 13px/1 var(--mono);
      letter-spacing: 0.13em;
    }

    .brand-mark {
      width: 19px;
      height: 19px;
      border-radius: 5px;
      background: var(--lime);
      box-shadow: inset -6px -6px 0 rgba(0, 0, 0, 0.14);
      transform: rotate(-5deg);
    }

    .top-meta {
      display: flex;
      align-items: center;
      gap: 13px;
      color: var(--muted);
      font: 12px/1 var(--mono);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--lime);
      box-shadow: 0 0 0 4px var(--lime-soft);
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: end;
      gap: 32px;
      margin-bottom: 30px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--lime);
      font: 600 11px/1 var(--mono);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(34px, 6vw, 66px);
      font-weight: 690;
      line-height: 0.98;
      letter-spacing: -0.065em;
    }

    h1 span { color: #696f79; }

    .clock {
      min-width: 174px;
      text-align: right;
      font-family: var(--mono);
    }

    .clock-time {
      display: block;
      font-size: 29px;
      line-height: 1;
      letter-spacing: -0.05em;
    }

    .clock-date {
      display: block;
      margin-top: 9px;
      color: var(--muted);
      font-size: 11px;
    }

    .command {
      position: relative;
      margin-bottom: 22px;
    }

    .command input {
      width: 100%;
      height: 58px;
      padding: 0 112px 0 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      outline: 0;
      color: var(--text);
      background: rgba(16, 18, 22, 0.88);
      font-size: 15px;
      transition: border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .command input:focus {
      border-color: #59616e;
      background: #111419;
      box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.035);
    }

    .search-icon {
      position: absolute;
      top: 50%;
      left: 19px;
      width: 15px;
      height: 15px;
      border: 1.7px solid var(--muted);
      border-radius: 50%;
      transform: translateY(-57%);
      pointer-events: none;
    }

    .search-icon::after {
      content: "";
      position: absolute;
      right: -5px;
      bottom: -3px;
      width: 6px;
      height: 1.7px;
      border-radius: 2px;
      background: var(--muted);
      transform: rotate(45deg);
    }

    .shortcut-hint {
      position: absolute;
      top: 50%;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      transform: translateY(-50%);
      color: var(--dim);
      font: 10px/1 var(--mono);
      pointer-events: none;
    }

    kbd {
      min-width: 23px;
      padding: 5px 7px;
      border: 1px solid #343942;
      border-bottom-color: #20242b;
      border-radius: 6px;
      color: #aab0ba;
      background: #1c2026;
      font: 10px/1 var(--mono);
      text-align: center;
      box-shadow: 0 2px 0 #07080a;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 310px;
      gap: 18px;
    }

    .section-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 11px;
      color: var(--muted);
      font: 600 10px/1 var(--mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .section-label strong {
      color: var(--dim);
      font-weight: 500;
      letter-spacing: 0;
    }

    .tool-list {
      display: grid;
      gap: 9px;
    }

    .tool-card {
      position: relative;
      display: grid;
      grid-template-columns: 50px minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      min-height: 104px;
      padding: 17px 17px 17px 19px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: inherit;
      background: linear-gradient(120deg, #13161a, #101216 68%);
      text-decoration: none;
      transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .tool-card:hover,
    .tool-card:focus-visible {
      border-color: var(--line-hot);
      background: linear-gradient(120deg, #171a20, #111419 68%);
      outline: 0;
      transform: translateY(-2px);
    }

    .tool-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 2px;
      background: var(--lime);
      opacity: 0;
      transition: opacity 160ms ease;
    }

    .tool-card:hover::before,
    .tool-card:focus-visible::before { opacity: 1; }

    .tool-icon {
      display: grid;
      place-items: center;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(201, 255, 99, 0.2);
      border-radius: 12px;
      color: var(--lime);
      background: var(--lime-soft);
      font: 700 17px/1 var(--mono);
      letter-spacing: -0.08em;
    }

    .tool-copy { min-width: 0; }
    .tool-title-row {
      display: flex;
      align-items: center;
      gap: 9px;
      min-width: 0;
    }

    .tool-title {
      margin: 0;
      overflow: hidden;
      font-size: 16px;
      font-weight: 660;
      letter-spacing: -0.025em;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .live-badge {
      flex: 0 0 auto;
      padding: 4px 6px;
      border: 1px solid rgba(201, 255, 99, 0.19);
      border-radius: 5px;
      color: var(--lime);
      background: rgba(201, 255, 99, 0.07);
      font: 600 8px/1 var(--mono);
      letter-spacing: 0.08em;
    }

    .tool-description {
      margin: 7px 0 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tool-tags {
      display: flex;
      gap: 5px;
      margin-top: 9px;
    }

    .tag {
      color: #656c76;
      font: 10px/1 var(--mono);
    }

    .tool-action {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #c6cad0;
      font: 11px/1 var(--mono);
    }

    .tool-action .key {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid #333842;
      border-radius: 7px;
      color: var(--muted);
      background: #191c21;
    }

    .empty-state {
      display: none;
      place-items: center;
      min-height: 104px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
    }

    .side-stack { display: grid; align-content: start; gap: 18px; }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(16, 18, 22, 0.84);
    }

    .memo-panel { padding: 16px; }

    .memo {
      display: block;
      width: 100%;
      min-height: 116px;
      padding: 0;
      resize: vertical;
      border: 0;
      outline: 0;
      color: #dfe2e6;
      background: transparent;
      font-size: 12px;
      line-height: 1.65;
    }

    .memo::placeholder { color: #4f555e; }

    .memo-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 11px;
      border-top: 1px solid var(--line);
      color: var(--dim);
      font: 9px/1 var(--mono);
    }

    .activity-panel { overflow: hidden; }

    .activity-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
    }

    .activity-row:last-child { border-bottom: 0; }

    .activity-name {
      color: #b8bdc5;
      font-size: 11px;
    }

    .activity-value {
      color: var(--muted);
      font: 10px/1.4 var(--mono);
      text-align: right;
    }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid #171a1f;
      color: #505660;
      font: 9px/1.5 var(--mono);
      letter-spacing: 0.06em;
    }

    .no-results .empty-state { display: grid; }
    .no-results .tool-list { display: none; }

    @media (max-width: 780px) {
      .shell { width: min(100% - 26px, 620px); padding-top: 18px; }
      .topbar { margin-bottom: 44px; }
      .hero { grid-template-columns: 1fr; gap: 20px; }
      .clock { display: none; }
      .workspace { grid-template-columns: 1fr; }
      .side-stack { grid-template-columns: 1fr 1fr; }
      .footer { margin-top: 34px; }
    }

    @media (max-width: 540px) {
      .top-meta span:not(.status-dot) { display: none; }
      h1 { font-size: 42px; }
      .command input { height: 54px; padding-right: 70px; }
      .shortcut-hint span { display: none; }
      .tool-card { grid-template-columns: 43px minmax(0, 1fr); min-height: 96px; gap: 13px; padding: 15px; }
      .tool-icon { width: 43px; height: 43px; font-size: 15px; }
      .tool-action { display: none; }
      .tool-description { white-space: normal; }
      .tool-tags { display: none; }
      .side-stack { grid-template-columns: 1fr; }
      .footer { align-items: flex-start; flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand"><span class="brand-mark" aria-hidden="true"></span>WORKBOX</div>
      <div class="top-meta"><span class="status-dot" aria-hidden="true"></span><span>LOCAL · READY</span></div>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <div>
        <p class="eyebrow">PERSONAL OPERATIONS</p>
        <h1 id="page-title">해야 할 일을<br><span>짧게 끝내는 곳.</span></h1>
      </div>
      <div class="clock" aria-label="현재 시각">
        <time class="clock-time" id="clockTime">--:--</time>
        <time class="clock-date" id="clockDate">----</time>
      </div>
    </section>

    <div class="command">
      <span class="search-icon" aria-hidden="true"></span>
      <input id="toolSearch" type="search" autocomplete="off" placeholder="도구 찾기 — 이름, 작업, 키워드" aria-label="도구 검색" />
      <div class="shortcut-hint"><span>FOCUS</span><kbd>/</kbd></div>
    </div>

    <div class="workspace">
      <section id="toolsSection" aria-labelledby="tools-title">
        <h2 class="section-label" id="tools-title"><span>TOOLS</span><strong id="toolCount">01</strong></h2>
        <div class="tool-list" id="toolList"></div>
        <div class="empty-state" id="emptyState">일치하는 도구 없음 · ESC로 검색 초기화</div>
      </section>

      <aside class="side-stack" aria-label="보조 도구">
        <section>
          <h2 class="section-label"><span>QUICK MEMO</span><strong><kbd>M</kbd></strong></h2>
          <div class="panel memo-panel">
            <textarea class="memo" id="quickMemo" placeholder="당장 기억할 것만 적기…" aria-label="빠른 메모"></textarea>
            <div class="memo-footer"><span id="memoStatus">AUTO-SAVE</span><span id="memoCount">0 / 500</span></div>
          </div>
        </section>

        <section>
          <h2 class="section-label"><span>LOCAL STATS</span><strong>THIS DEVICE</strong></h2>
          <div class="panel activity-panel">
            <div class="activity-row"><span class="activity-name">마지막 실행</span><span class="activity-value" id="lastOpened">아직 없음</span></div>
            <div class="activity-row"><span class="activity-name">누적 실행</span><span class="activity-value" id="launchCount">0회</span></div>
            <div class="activity-row"><span class="activity-name">등록 도구</span><span class="activity-value" id="registeredCount">1개</span></div>
          </div>
        </section>
      </aside>
    </div>

    <footer class="footer">
      <span>1–9 실행 · / 검색 · M 메모 · ESC 초기화</span>
      <span>데이터는 이 브라우저에만 저장됨</span>
    </footer>
  </main>

  <script>
    // 새 도구는 이 배열에 한 항목만 추가하면 런처에 자동으로 표시됩니다.
    const tools = [
      {
        id: "seteuk-helper",
        title: "교과세특 기재도우미",
        short: "세특",
        description: "학생 자료와 교사 평가를 정리해 세특 작성 프롬프트와 결과를 관리.",
        tags: ["학생부", "프롬프트", "엑셀"],
        href: "./tools/seteuk-helper.html",
        status: "READY"
      }
    ];

    const $ = (selector) => document.querySelector(selector);
    const search = $("#toolSearch");
    const list = $("#toolList");
    const toolsSection = $("#toolsSection");
    const memo = $("#quickMemo");
    let filteredTools = [...tools];
    let saveTimer;

    function safeRead(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value === null ? fallback : value;
      } catch (_) {
        return fallback;
      }
    }

    function safeWrite(key, value) {
      try { localStorage.setItem(key, value); } catch (_) {}
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"]/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;"
      })[char]);
    }

    function renderTools(query = "") {
      const keyword = query.trim().toLocaleLowerCase("ko");
      filteredTools = tools.filter((tool) => {
        const haystack = [tool.title, tool.description, ...tool.tags].join(" ").toLocaleLowerCase("ko");
        return !keyword || haystack.includes(keyword);
      });

      list.innerHTML = filteredTools.map((tool) => {
        const originalIndex = tools.findIndex((item) => item.id === tool.id);
        const tags = tool.tags.map((tag) => `<span class="tag">#${escapeHtml(tag)}</span>`).join("");
        return `
          <a class="tool-card" href="${escapeHtml(tool.href)}" data-tool-id="${escapeHtml(tool.id)}">
            <span class="tool-icon" aria-hidden="true">${escapeHtml(tool.short)}</span>
            <span class="tool-copy">
              <span class="tool-title-row">
                <span class="tool-title">${escapeHtml(tool.title)}</span>
                <span class="live-badge">${escapeHtml(tool.status)}</span>
              </span>
              <span class="tool-description">${escapeHtml(tool.description)}</span>
              <span class="tool-tags">${tags}</span>
            </span>
            <span class="tool-action"><span>OPEN ↗</span><span class="key">${originalIndex + 1}</span></span>
          </a>`;
      }).join("");

      toolsSection.classList.toggle("no-results", filteredTools.length === 0);
      $("#toolCount").textContent = String(filteredTools.length).padStart(2, "0");
      list.querySelectorAll(".tool-card").forEach((card) => {
        card.addEventListener("click", () => recordLaunch(card.dataset.toolId));
      });
    }

    function recordLaunch(id) {
      const tool = tools.find((item) => item.id === id);
      const count = Number(safeRead("workbox.launchCount", "0")) + 1;
      safeWrite("workbox.launchCount", String(count));
      safeWrite("workbox.lastOpened", JSON.stringify({ title: tool?.title || id, time: Date.now() }));
    }

    function renderStats() {
      const count = Number(safeRead("workbox.launchCount", "0"));
      $("#launchCount").textContent = `${count.toLocaleString("ko-KR")}회`;
      $("#registeredCount").textContent = `${tools.length}개`;

      try {
        const last = JSON.parse(safeRead("workbox.lastOpened", "null"));
        if (last?.time) {
          const date = new Date(last.time);
          $("#lastOpened").innerHTML = `${escapeHtml(last.title)}<br>${date.toLocaleDateString("ko-KR", { month: "2-digit", day: "2-digit" })} ${date.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", hour12: false })}`;
        }
      } catch (_) {}
    }

    function updateClock() {
      const now = new Date();
      $("#clockTime").textContent = now.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false });
      $("#clockDate").textContent = now.toLocaleDateString("ko-KR", { year: "numeric", month: "2-digit", day: "2-digit", weekday: "short" });
    }

    function updateMemoCount() {
      $("#memoCount").textContent = `${memo.value.length} / 500`;
    }

    search.addEventListener("input", () => renderTools(search.value));
    memo.value = safeRead("workbox.quickMemo", "").slice(0, 500);
    memo.maxLength = 500;
    updateMemoCount();

    memo.addEventListener("input", () => {
      updateMemoCount();
      $("#memoStatus").textContent = "SAVING…";
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        safeWrite("workbox.quickMemo", memo.value);
        $("#memoStatus").textContent = "SAVED";
      }, 300);
    });

    document.addEventListener("keydown", (event) => {
      const isTyping = ["INPUT", "TEXTAREA"].includes(document.activeElement?.tagName);

      if (event.key === "/" && !isTyping) {
        event.preventDefault();
        search.focus();
      }

      if ((event.key === "m" || event.key === "M") && !isTyping) {
        event.preventDefault();
        memo.focus();
      }

      if (event.key === "Escape") {
        search.value = "";
        renderTools();
        search.blur();
        memo.blur();
      }

      if (/^[1-9]$/.test(event.key) && !isTyping) {
        const tool = tools[Number(event.key) - 1];
        if (tool) {
          event.preventDefault();
          recordLaunch(tool.id);
          window.location.href = tool.href;
        }
      }

      if (event.key === "Enter" && document.activeElement === search && filteredTools.length === 1) {
        event.preventDefault();
        recordLaunch(filteredTools[0].id);
        window.location.href = filteredTools[0].href;
      }
    });

    window.addEventListener("pageshow", renderStats);
    renderTools();
    renderStats();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
